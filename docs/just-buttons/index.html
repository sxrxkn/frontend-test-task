<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Кнопки</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="buttons">
      <section class="button-states">
        <div class="button-column">
          <button class="button">Просмотреть</button>
          <button class="button button-hover">Просмотреть</button>
          <button class="button button-active">Просмотреть</button>
          <button class="button" disabled>Просмотреть</button>
        </div>

        <div class="button-column">
          <button class="button button-red-outline">Просмотреть</button>
          <button class="button button-red-outline button-hover">
            Просмотреть
          </button>
          <button class="button button-red-outline button-active">
            Просмотреть
          </button>
          <button class="button button-red-outline" disabled>
            Просмотреть
          </button>
        </div>

        <div class="button-column">
          <button class="button button-red">Просмотреть</button>
          <button class="button button-red button-hover">Просмотреть</button>
          <button class="button button-red button-active">Просмотреть</button>
          <button class="button button-red" disabled>Просмотреть</button>
        </div>

        <div class="button-column">
          <button class="button button-arrow">Просмотреть</button>
          <button class="button button-arrow button-hover">Просмотреть</button>
          <button class="button button-arrow button-active">Просмотреть</button>
          <button class="button button-arrow" disabled>Просмотреть</button>
        </div>

        <div class="button-column">
          <button class="button button-green">Просмотреть</button>
          <button class="button button-green button-hover">Просмотреть</button>
          <button class="button button-green button-active">Просмотреть</button>
          <button class="button button-green" disabled>Просмотреть</button>
        </div>

        <div class="button-column">
          <button class="button button-green-outline">Просмотреть</button>
          <button class="button button-green-outline button-hover">
            Просмотреть
          </button>
          <button class="button button-green-outline button-active">
            Просмотреть
          </button>
          <button class="button button-green-outline" disabled>
            Просмотреть
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
