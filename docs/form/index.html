<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Форма</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="form-header">
        <h1>Заполните поля</h1>
        <p>ну пожалуйста</p>
      </header>

      <form class="form" action="#" method="post">
        <section class="form-section">
          <h2>Основное</h2>

          <div class="field">
            <label for="name">Имя</label>
            <input
              id="name"
              name="name"
              type="text"
              placeholder="по паспорту"
            />
          </div>

          <div class="field">
            <label for="mood">Цвет вашего настроения</label>
            <input id="mood" name="mood" type="color" value="#0000ff" />
          </div>
        </section>

        <section class="form-section form-section-yellow">
          <h2>Дополнительное</h2>

          <div class="field">
            <label for="comment">Комментарий</label>
            <textarea
              id="comment"
              name="comment"
              rows="3"
              placeholder="Напишите хоть что-нибудь.&#10;Если хотите, конечно."
            ></textarea>
          </div>
        </section>

        <section class="form-bottom">
          <label class="check">
            <input name="radio" type="radio" />
            <span>Ну а тут просто полежит радиобатон</span>
          </label>

          <label class="check">
            <input name="agree" type="checkbox" checked />
            <span>
              Соглашаюсь на всё, что бы вы не придумали и осознаю, что это может
              означать <a href="#">что угодно</a>
            </span>
          </label>

          <button type="submit">Отправить все мои данные</button>
        </section>
      </form>
    </main>
  </body>
</html>
